name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'chore/**'
      - 'feat/**'
      - 'fix/**'
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Format
            command: pnpm format:check
          - name: Lint
            command: pnpm lint
          - name: Type Check
            command: pnpm typecheck
          - name: Test
            command: pnpm test
          - name: Build
            command: pnpm build
          - name: Security Audit
            command: pnpm run audit
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.26.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.command }}
